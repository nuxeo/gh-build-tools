name: Test actions 🟦

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - '.github/actions/check-blocker-jira-issues/**'
      - '.github/actions/nos-publish/**'
      - '.github/actions/nuxeo-docker-build/**'
      - '.github/workflows/test.yml'
  pull_request_review:
    types: [ submitted ]

jobs:
  check-blocker-jira-issues-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github/actions/check-blocker-jira-issues
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/actions/check-blocker-jira-issues/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run unit tests
        run: python -m pytest test_action.py -v

  check-blocker-jira-issues-integration:
    needs: check-blocker-jira-issues-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect unresolved blocker tickets
        id: detect_blockers
        continue-on-error: true
        uses: ./.github/actions/check-blocker-jira-issues
        with:
          jira-base-url: https://hyland.atlassian.net
          jira-username: ${{ secrets.JIRA_USER }}
          jira-password: ${{ secrets.JIRA_API_TOKEN }}
          jira-project: OPSEXP
          jira-moving-version: _CI_GH_ACTIONS
          check-uncommitted: "false"

      - name: Assert that blocker tickets were detected
        run: |
          if [ "${{ steps.detect_blockers.outcome }}" != "failure" ]; then
            echo "❌ Expected step to fail (unresolved blockers exist), but it passed."
            exit 1
          fi
          if [ "${{ steps.detect_blockers.outputs.has-blocker-issues }}" != "true" ]; then
            echo "❌ Expected has-blocker-issues=true"
            exit 1
          fi
          if [ -z "${{ steps.detect_blockers.outputs.unresolved-tickets }}" ]; then
            echo "❌ Expected unresolved-tickets to be non-empty"
            exit 1
          fi
          echo "✅ Blocker tickets detected correctly: ${{ steps.detect_blockers.outputs.unresolved-tickets }}"

      - name: No blocker tickets for clean version
        id: clean_check
        uses: ./.github/actions/check-blocker-jira-issues
        with:
          jira-base-url: https://hyland.atlassian.net
          jira-username: ${{ secrets.JIRA_USER }}
          jira-password: ${{ secrets.JIRA_API_TOKEN }}
          jira-project: OPSEXP
          jira-moving-version: "nonexistent-version-xyz-999"
          check-uncommitted: "false"

      - name: Assert that no blocker tickets were found for clean version
        run: |
          if [ "${{ steps.clean_check.outputs.has-blocker-issues }}" != "false" ]; then
            echo "❌ Expected has-blocker-issues=false for non-existent version"
            exit 1
          fi
          if [ -n "${{ steps.clean_check.outputs.unresolved-tickets }}" ]; then
            echo "❌ Expected unresolved-tickets to be empty"
            exit 1
          fi
          echo "✅ Clean check passed correctly"

      # NOTE: uses tag range v0.8.0..v0.9.0 from this repo; assumes no OPSEXP ticket keys in those commits
      - name: Detect uncommitted blocker tickets
        id: detect_uncommitted
        continue-on-error: true
        uses: ./.github/actions/check-blocker-jira-issues
        with:
          jira-base-url: https://hyland.atlassian.net
          jira-username: ${{ secrets.JIRA_USER }}
          jira-password: ${{ secrets.JIRA_API_TOKEN }}
          jira-project: OPSEXP
          jira-moving-version: _CI_GH_ACTIONS
          check-uncommitted: "true"
          build-version: "0.9.0"
          previous-release-version: "0.8.0"

      - name: Assert that uncommitted blocker tickets were detected
        run: |
          if [ "${{ steps.detect_uncommitted.outcome }}" != "failure" ]; then
            echo "❌ Expected step to fail (uncommitted blockers exist), but it passed."
            exit 1
          fi
          if [ "${{ steps.detect_uncommitted.outputs.has-blocker-issues }}" != "true" ]; then
            echo "❌ Expected has-blocker-issues=true"
            exit 1
          fi
          if [ -z "${{ steps.detect_uncommitted.outputs.uncommitted-tickets }}" ]; then
            echo "❌ Expected uncommitted-tickets to be non-empty"
            exit 1
          fi
          echo "✅ Uncommitted blocker tickets detected correctly: ${{ steps.detect_uncommitted.outputs.uncommitted-tickets }}"

  nos-publish:
    if: >-
      (github.event.review.state == 'approved' && contains(fromJSON('["dependabot[bot]", "github-actions[bot]"]'), github.event.pull_request.user.login)) ||
      (github.actor != 'dependabot[bot]' && github.event_name != 'pull_request_review')
    runs-on: ubuntu-latest
    env:
      ZIP_PACKAGE_NAME: dummy.zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build zip package file 📦
        run: zip ${{ env.ZIP_PACKAGE_NAME }} package.xml install.xml
        working-directory: .github/actions/nos-publish

      - name: Publish Nuxeo Package to NOS staging Connect 🫸
        id: publish_nos
        uses: ./.github/actions/nos-publish
        with:
          package-path: .github/actions/nos-publish/${{ env.ZIP_PACKAGE_NAME }}
          nos-username: ${{ secrets.CONNECT_PREPROD_USERNAME }}
          nos-token: ${{ secrets.CONNECT_PREPROD_PASSWORD }}
          nos-env: staging
          nos-org: nuxeo-devops

      - name: Unpublish Module 🫥
        if: always() && steps.publish_nos.outcome != 'skipped'
        env:
          PACKAGE_URL: ${{ steps.publish_nos.outputs.package-url }}
        run: |
          RESPONSE=$(curl \
            -w "%{http_code}" \
            -su "${{ secrets.CONNECT_PREPROD_USERNAME }}:${{ secrets.CONNECT_PREPROD_PASSWORD }}" \
            "${PACKAGE_URL//\?//delete?}")
          if [ "$RESPONSE" != "303" ]; then
            echo "🧟 Failed to unpublish package from NOS Connect. Response code: $RESPONSE"
            exit 1
          fi

  nuxeo-docker-build:
    if: >-
      (github.event.review.state == 'approved' && contains(fromJSON('["dependabot[bot]", "github-actions[bot]"]'), github.event.pull_request.user.login)) ||
      (github.actor != 'dependabot[bot]' && github.event_name != 'pull_request_review')
    runs-on: ubuntu-latest
    env:
      NUXEO_CONNECT_MODULE: nuxeo-web-ui
      NUXEO_LOCAL_MODULE_PACKAGE: nuxeo-ai-image-quality-package
      NUXEO_LOCAL_MODULE: nuxeo-ai-image-quality
      NUXEO_LOCAL_MODULES_PATH: addons
      NUXEO_OS_PACKAGES: |
        awscli
        ccextractor-nuxeo
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare addons directory
        run: mkdir -p ${{ env.NUXEO_LOCAL_MODULES_PATH }}

      - name: Fetch Nuxeo local module
        env:
          PKG_URL: https://packages.nuxeo.com/repository/maven-public-releases/org/nuxeo/ai/${{ env.NUXEO_LOCAL_MODULE_PACKAGE }}/4.0.2/${{ env.NUXEO_LOCAL_MODULE_PACKAGE }}-4.0.2.zip
          NEXUS_USER: ${{ secrets.REPOSITORY_MANAGER_USERNAME }}
          NEXUS_TOKEN: ${{ secrets.REPOSITORY_MANAGER_PASSWORD }}
        run: |
          curl -fsSL -u "$NEXUS_USER:$NEXUS_TOKEN" "$PKG_URL" -o ${{ env.NUXEO_LOCAL_MODULES_PATH }}/${{ env.NUXEO_LOCAL_MODULE_PACKAGE }}-4.0.2.zip;
          test -s ${{ env.NUXEO_LOCAL_MODULES_PATH }}/${{ env.NUXEO_LOCAL_MODULE_PACKAGE }}-4.0.2.zip

      - name: Build nuxeo image and push to registry
        uses: ./.github/actions/nuxeo-docker-build
        id: build_nuxeo_image
        with:
          base-registry-username: ${{ secrets.REPOSITORY_MANAGER_USERNAME }}
          base-registry-password: ${{ secrets.REPOSITORY_MANAGER_PASSWORD }}
          nuxeo-connect-modules: ${{ env.NUXEO_CONNECT_MODULE }}
          nuxeo-clid: ${{ secrets.CONNECT_CLID }}
          nuxeo-local-modules-path: ${{ env.NUXEO_LOCAL_MODULES_PATH }}
          os-packages: ${{ env.NUXEO_OS_PACKAGES }}
          os-packages-user: ${{ secrets.REPOSITORY_MANAGER_USERNAME }}
          os-packages-token: ${{ secrets.REPOSITORY_MANAGER_PASSWORD }}
          image-name: nuxeo/nuxeo-ci-builder-test
          image-tag: ${{ github.run_id }}
          image-title: "Nuxeo CI Builder Test"
          load-image: "true"
          platforms: linux/amd64 # load can only be done for a single platform
          registry: localhost

      - name: Verify installed Nuxeo Modules
        env:
          IMAGE_URL: ${{ steps.build_nuxeo_image.outputs.image-url }}
          EXPECTED_MODULES: ${{ env.NUXEO_CONNECT_MODULE }} ${{ env.NUXEO_LOCAL_MODULE }}
          EXPECTED_PACKAGES: ${{ env.NUXEO_OS_PACKAGES }}
        run: .github/actions/nuxeo-docker-build/verify.sh
