name: Update Nuxeo Parent
description: Update nuxeo-parent version in pom.xml using Updatecli
inputs:
  github-actor:
    description: |
      GitHub actor to use to create PRs, it should be another user than the default github-actions in order to let the
      bot-auto-merge workflow approve and merge the created PRs.
    required: true
  github-token:
    description: |
      GitHub token to use to create PRs, it should be another token than the default GITHUB_TOKEN in order to let the
      bot-auto-merge workflow approve and merge the created PRs.
    required: true
  mvn-repo-username:
    description: Maven repository username
    required: true
  mvn-repo-password:
    description: Maven repository password
    required: true
  base-branch:
    description: Base branch to check
    required: false
    default: "2023"
  java-version:
    description: the desired Java version
    default: "17"
    required: false

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        repository: '${{ github.repository }}'
        ref: ${{ inputs.base-branch }}
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Maven Build
      uses: nuxeo/gh-build-tools/.github/actions/setup-maven-build@7398a98d9cc4c317e9d1d08101fb63b5cd895c4f # v0.3.0
      with:
        java-version: ${{ inputs.java-version }}

    - name: Compute Nuxeo Parent version filter pattern
      env:
        MVN_REPO_USERNAME: ${{ inputs.mvn-repo-username }}
        MVN_REPO_PASSWORD: ${{ inputs.mvn-repo-password }}
      shell: bash
      run: |
        BASE_BRANCH="${{ inputs.base-branch }}"
        MAJOR_VERSION=${BASE_BRANCH#lts-}

        CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.parent.version -q -DforceStdout) || {
          echo "Failed to evaluate project.parent.version via Maven. Maven logs:"
          mvn help:evaluate -Dexpression=project.parent.version -DforceStdout
          exit 1
        }
        echo "Current nuxeo-parent version from pom.xml: $CURRENT_VERSION"

        # Normalize to 2-digit version to handle dev snapshots (e.g. 2025.17.1 -> 2025.17)
        CURRENT_VERSION=$(echo "$CURRENT_VERSION" | cut -d'.' -f1,2)
        echo "Normalized nuxeo-parent version: $CURRENT_VERSION"
        MINOR_VERSION=$(echo "$CURRENT_VERSION" | cut -d'.' -f2)

        # Build a regex matching minor versions >= $MINOR_VERSION.
        # The regex is constructed digit-by-digit from the current minor version:
        # - For each digit position, allow strictly greater digits with any digits in remaining positions
        # - For the last digit position, allow the current digit through 9
        # - Finally, allow any number with more digits (e.g. 100+ when current is 2-digit)
        #
        # Example: MINOR_VERSION=17 produces (1[7-9]|[2-9]\d|\d{3,})
        #   - 1[7-9]   matches 17, 18, 19       (last digit >= 7, prefix fixed)
        #   - [2-9]\d  matches 20-99            (first digit > 1, any second digit)
        #   - \d{3,}   matches 100+             (more digits than current)
        minor_digit_count=${#MINOR_VERSION}
        regex_parts=""

        for ((i=0; i<minor_digit_count; i++)); do
          d="${MINOR_VERSION:$i:1}"
          prefix="${MINOR_VERSION:0:$i}"
          remaining=$((minor_digit_count - i - 1))

          if ((i == minor_digit_count-1)); then
            # Last digit position: allow current digit through 9, keeping all preceding digits fixed
            ((d < 9)) && digit_range="[${d}-9]" || digit_range="${d}"
            regex_parts="${regex_parts}${prefix}${digit_range}|"
          else
            # Non-last digit position: allow digits strictly greater than current at this position,
            # with any digit allowed in the remaining positions
            next=$((d+1))
            if ((next <= 9)); then
              ((next < 9)) && digit_range="[${next}-9]" || digit_range="${next}"
              if ((remaining == 1)); then
                suffix='\d'
              else
                suffix="\\d{${remaining}}"
              fi
              regex_parts="${regex_parts}${prefix}${digit_range}${suffix}|"
            fi
          fi
        done

        # Also allow any number with more digits than the current minor (e.g. 100+ if current is 2-digit)
        MINOR_GTE_REGEX="(${regex_parts}\\d{$((minor_digit_count+1)),})"
        NUXEO_PARENT_VERSION_PATTERN="^${MAJOR_VERSION}\\.${MINOR_GTE_REGEX}$"
        echo "Computed nuxeo-parent version filter pattern: $NUXEO_PARENT_VERSION_PATTERN"
        printf 'NUXEO_PARENT_VERSION_PATTERN=%s\n' "$NUXEO_PARENT_VERSION_PATTERN" >> $GITHUB_ENV

    - name: Retrieve Repository Name
      shell: bash
      run: |
        FULL_REPOSITORY_NAME="${{ github.repository }}"
        REPOSITORY_NAME=${FULL_REPOSITORY_NAME#*/}
        echo "REPOSITORY_NAME=$REPOSITORY_NAME" >> $GITHUB_ENV

    - name: Install Updatecli
      uses: Alfresco/alfresco-build-tools/.github/actions/setup-updatecli@9d08e878673ab3718a1b2e462acea790ca57ce41 # v15.1.0
      with:
        # bug in version 0.112.0, see github.com/updatecli/updatecli/pull/7223
        version: '0.111.0'

    - name: Run Updatecli
      env:
        REPOSITORY_NAME: ${{ env.REPOSITORY_NAME }}
        NUXEO_PARENT_VERSION_PATTERN: ${{ env.NUXEO_PARENT_VERSION_PATTERN }}
        MVN_REPO_USERNAME: ${{ env.MVN_REPO_USERNAME || inputs.mvn-repo-username }}
        MVN_REPO_PASSWORD: ${{ env.MVN_REPO_PASSWORD || inputs.mvn-repo-password }}
        UPDATECLI_GITHUB_BRANCH: "${{ inputs.base-branch }}"
        UPDATECLI_GITHUB_TOKEN: "${{ inputs.github-token }}"
        UPDATECLI_GITHUB_USERNAME: "${{ inputs.github-actor }}"
      shell: bash
      run: updatecli --config ${{ github.action_path }}/updatecli.d apply
