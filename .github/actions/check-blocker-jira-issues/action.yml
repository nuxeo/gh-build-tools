name: 🔍 Check Blocker Jira Issues
description: |
  Check for unresolved and optionally uncommitted blocker Jira issues before a release.
  Queries Jira for high-priority issues matching the given fixVersion(s) and optionally
  cross-references them against the Git changelog to detect uncommitted fixes.
  Outputs a Markdown notification message in every case and fails the workflow by default
  when issues are found.

inputs:
  jira-base-url:
    description: Jira server base URL (e.g. https://jira.nuxeo.com).
    required: true
  jira-username:
    description: Jira username for API authentication.
    required: true
  jira-password:
    description: Jira password or API token for authentication.
    required: true
  jira-project:
    description: Jira project key (e.g. NXCON).
    required: true
  jira-moving-version:
    description: The moving fixVersion in Jira (e.g. N3DV-2023.x).
    required: true
  jira-release-version:
    description: |
      An optional concrete release fixVersion to include in the query (e.g. N3DV-1.2).
      When set, the fixVersion clause becomes fixVersion in (<moving>, <release>).
    default: ""
  jira-priority:
    description: The Jira priority level to filter on.
    default: "Highest"
  jira-ignore-tag:
    description: Jira tag value to exclude from uncommitted issue checks (issues tagged with this are ignored).
    default: "grype"
  check-uncommitted:
    description: Whether to also check for uncommitted blocker issues (issues resolved but not present in Git changelog).
    default: "true"
  build-version:
    description: The current build version (tag/ref). Required when check-uncommitted is true.
    default: ""
  release-version:
    description: The target release version. Required when check-uncommitted is true. Used to compute the previous release version range.
    default: ""
  previous-release-version:
    description: |
      Override for the previous release version. When empty, it is derived from release-version
      by decrementing the minor segment.
    default: ""
  repository-url:
    description: Repository URL for context in summary. Defaults to the current repository.
    default: ""

outputs:
  has-blocker-issues:
    description: '"true" if any unresolved or uncommitted blocker issues were found, "false" otherwise.'
    value: ${{ steps.check.outputs.has_blocker_issues }}
  unresolved-tickets:
    description: Comma-separated Jira ticket keys of unresolved blocker issues.
    value: ${{ steps.check.outputs.unresolved_tickets }}
  uncommitted-tickets:
    description: Comma-separated Jira ticket keys of uncommitted blocker issues. Empty when check-uncommitted is false.
    value: ${{ steps.check.outputs.uncommitted_tickets }}

runs:
  using: composite
  steps:
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.11"
        cache-dependency-path: "${{ github.action_path }}/requirements.txt"

    - name: Install python dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Compute previous release version
      id: prev_version
      if: inputs.check-uncommitted == 'true' && inputs.previous-release-version == ''
      shell: bash
      run: |
        VERSION="${{ inputs.release-version }}"
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f2)
        PATCH=$(echo "$VERSION" | cut -d. -f3)
        if [ "$MINOR" -gt 0 ]; then
          PREV="${MAJOR}.$((MINOR - 1)).${PATCH}"
        else
          PREV="$((MAJOR - 1)).0.${PATCH}"
        fi
        echo "version=$PREV" >> "$GITHUB_OUTPUT"

    - name: Run blocker issues check
      id: check
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        JIRA_URL: ${{ inputs.jira-base-url }}
        JIRA_USER: ${{ inputs.jira-username }}
        JIRA_TOKEN: ${{ inputs.jira-password }}
        JIRA_PROJECT: ${{ inputs.jira-project }}
        JIRA_MOVING_VERSION: ${{ inputs.jira-moving-version }}
        JIRA_RELEASE_VERSION: ${{ inputs.jira-release-version }}
        JIRA_PRIORITY: ${{ inputs.jira-priority }}
        JIRA_IGNORE_TAG: ${{ inputs.jira-ignore-tag }}
        CHECK_UNCOMMITTED: ${{ inputs.check-uncommitted }}
        BUILD_VERSION: ${{ inputs.build-version }}
        PREVIOUS_RELEASE_VERSION: ${{ inputs.previous-release-version || steps.prev_version.outputs.version }}
      run: python action.py

    - name: Generate GitHub summary
      if: always()
      shell: bash
      env:
        HAS_BLOCKERS: ${{ steps.check.outputs.has_blocker_issues }}
        UNRESOLVED: ${{ steps.check.outputs.unresolved_tickets }}
        UNCOMMITTED: ${{ steps.check.outputs.uncommitted_tickets }}
        JIRA_URL: ${{ inputs.jira-base-url }}
      run: |
        {
          echo "## 🔍 Blocker Jira Issues Check"
          echo ""
          if [ "$HAS_BLOCKERS" = "true" ]; then
            echo "### ❌ Blocker issues found"
          else
            echo "### ✅ No blocker issues found"
          fi
          echo ""
          if [ -n "$UNRESOLVED" ]; then
            echo "#### ⚠️ Unresolved blocker tickets"
            echo ""
            IFS=',' read -ra KEYS <<< "$UNRESOLVED"
            for key in "${KEYS[@]}"; do
              echo "- [$key](${JIRA_URL}/browse/$key)"
            done
            echo ""
          fi
          if [ -n "$UNCOMMITTED" ]; then
            echo "#### ⚠️ Uncommitted blocker tickets"
            echo ""
            IFS=',' read -ra KEYS <<< "$UNCOMMITTED"
            for key in "${KEYS[@]}"; do
              echo "- [$key](${JIRA_URL}/browse/$key)"
            done
            echo ""
          fi
        } >> "$GITHUB_STEP_SUMMARY"
